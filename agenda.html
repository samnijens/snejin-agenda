<!DOCTYPE html>
<html lang="nl">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Snejin Agenda</title>

    <link rel="icon" href="logo.png">

    <link rel="stylesheet" href="style.css">

    <!-- FullCalendar -->
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>

</head>

<body class="agenda-page">

<header class="topbar">

    <div class="logo-area">

        <img src="logo.png" class="logo-small">

        <div>

            <h1>Snejin Agenda</h1>

            <span>Familieagenda</span>

        </div>

    </div>

    <div class="top-buttons">

        <input
            id="search"
            type="search"
            placeholder="🔍 Zoek afspraak...">

        <button id="themeButton">
            🌙
        </button>

        <button id="logoutButton">
            Uitloggen
        </button>

    </div>

</header>

<main>

    <section class="calendar-card">

        <div id="calendar"></div>

    </section>

</main>

<button id="addEventButton" class="floatingButton">

    ➕

</button>

<!-- Popup -->

<div id="eventModal" class="modal">

    <div class="modal-content">

        <h2>Nieuwe afspraak</h2>

        <label>Naam</label>

        <input
            id="eventTitle"
            type="text"
            placeholder="Bijvoorbeeld: Werken">

        <label>Omschrijving</label>

        <textarea
            id="eventDescription"
            placeholder="Extra informatie"></textarea>

        <label>Datum</label>

        <input
            id="eventDate"
            type="date">

        <label>Tijd</label>

        <input
            id="eventTime"
            type="time">

        <label>

            <input
                id="allDay"
                type="checkbox">

            Hele dag

        </label>

        <label>Soort afspraak</label>

        <select id="eventType">

            <option value="werk">🔴 Werken</option>

            <option value="vakantie">🟢 Vakantie</option>

            <option value="activiteit">🟩 Activiteit</option>

            <option value="verjaardag">🟠 Verjaardag</option>

            <option value="feestdag">🟡 Feestdag</option>

        </select>

        <div class="modalButtons">

            <button id="saveEvent">

                Opslaan

            </button>

            <button id="cancelEvent">

                Annuleren

            </button>

        </div>

    </div>

</div>

<script type="module" src="agenda.js"></script>

</body>
</html>
