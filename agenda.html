<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snejin Agenda</title>
<link rel="icon" href="logo.png">
<link rel="stylesheet" href="style.css">
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">
</head>
<body class="agenda-page">

<header class="topbar">
  <div class="logo-area">
    <img src="logo.png" class="logo-small" alt="Logo">
    <div>
      <h1>Snejin Agenda</h1>
      <span>Familieagenda</span>
    </div>
  </div>

  <div class="top-buttons">
    <input id="search" type="search" placeholder="🔍 Zoek afspraak">
    <button id="themeButton" type="button">🌙</button>
    <button id="logoutButton" type="button">🚪 Uitloggen</button>
  </div>
</header>

<main>
  <section class="calendar-card">
    <div id="calendar"></div>
  </section>
</main>

<button id="addEventButton" class="floatingButton" type="button">+</button>

<div id="eventModal" class="modal" style="display:none;">
  <div class="modal-content">
    <h2>Nieuwe afspraak</h2>

    <label>Naam</label>
    <input id="eventTitle" type="text">

    <label>Omschrijving</label>
    <textarea id="eventDescription"></textarea>

    <label>Datum</label>
    <input id="eventDate" type="date">

    <label>Tijd</label>
    <input id="eventTime" type="time">

    <label><input id="allDay" type="checkbox"> Hele dag</label>

    <label>Categorie</label>
    <select id="eventType">
      <option value="work">🔴 Werken</option>
      <option value="holiday">🟢 Vakantie</option>
      <option value="activity">🟩 Activiteit</option>
      <option value="birthday">🟠 Verjaardag</option>
      <option value="holidayofficial">🟡 Officiële feestdag</option>
    </select>

    <div class="modal-buttons">
      <button id="saveEventButton">Opslaan</button>
      <button id="deleteEventButton">Verwijderen</button>
      <button id="cancelEventButton">Annuleren</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
<script type="module" src="agenda.js"></script>
</body>
</html>
