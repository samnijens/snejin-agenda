<!DOCTYPE html>
<html lang="nl">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Snejin Agenda</title>

    <link rel="stylesheet" href="style.css">

    <script type="module" src="firebase.js"></script>
    <script type="module" src="auth.js" defer></script>

</head>

<body class="login-body">

<div class="overlay">

    <div class="login-box">

        <img src="logo.png" class="logo" alt="Snejin Logo">

        <h1>Snejin Agenda</h1>

        <p>
            Welkom terug.<br>
            Log in om je familieagenda te openen.
        </p>

        <form id="loginForm">

            <input
                type="email"
                id="email"
                placeholder="📧 E-mailadres"
                required
            >

            <input
                type="password"
                id="password"
                placeholder="🔒 Wachtwoord"
                required
            >

            <button type="submit">

                Inloggen

            </button>

        </form>

        <div id="errorBox"></div>

        <div class="footer">

            © 2026 Snejin Agenda<br><br>

            Familie • Agenda • Planning

        </div>

    </div>

</div>

</body>

</html>
