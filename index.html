<!DOCTYPE html>
<html lang="nl">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Snejin Agenda - Inloggen</title>

    <meta name="theme-color" content="#00A896">

    <link rel="icon" type="image/png" href="logo.png">

    <link rel="stylesheet" href="style.css">

</head>

<body class="login-background">

    <div class="login-container">

        <div class="login-card">

            <img
                src="logo.png"
                alt="Snejin Agenda Logo"
                class="logo">

            <h1>Snejin Agenda</h1>

            <p class="subtitle">
                Welkom! Log in om je familieagenda te openen.
            </p>

            <form id="loginForm">

                <div class="input-group">

                    <label for="email">
                        E-mailadres
                    </label>

                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="naam@email.nl"
                        autocomplete="email"
                        required>

                </div>

                <div class="input-group">

                    <label for="password">
                        Wachtwoord
                    </label>

                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Voer je wachtwoord in"
                        autocomplete="current-password"
                        required>

                </div>

                <button
                    type="submit"
                    id="loginButton">

                    🔐 Inloggen

                </button>

            </form>

            <div id="message"></div>

        </div>

    </div>

    <script type="module" src="login.js"></script>

</body>

</html>
