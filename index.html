<!DOCTYPE html>
<html lang="nl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Snejin Agenda - Login</title>

<link rel="stylesheet" href="css/style.css">

</head>


<body class="login-background">


<div class="login-box">


    <img 
    src="images/logo.png" 
    class="logo"
    alt="Snejin Agenda logo">


    <h1>
        Snejin Agenda
    </h1>


    <p>
        Welkom terug 🌴☀️
    </p>


    <input
    id="email"
    type="email"
    placeholder="Email">


    <input
    id="password"
    type="password"
    placeholder="Wachtwoord">


    <button id="loginButton">
        Inloggen
    </button>


    <p id="error"></p>


</div>


<script 
type="module" 
src="js/login.js">
</script>


</body>

</html>
